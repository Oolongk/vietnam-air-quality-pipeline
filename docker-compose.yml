services:
  timescaledb:
    image: ${TIMESCALEDB_IMAGE:-timescale/timescaledb:2.28.0-pg17}
    container_name: air-quality-timescaledb

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Asia/Ho_Chi_Minh

    ports:
      - "${POSTGRES_PORT:-5432}:5432"

    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

    restart: unless-stopped

    networks:
      - air_quality_network


volumes:
  timescaledb_data:


networks:
  air_quality_network:
    name: air-quality-network